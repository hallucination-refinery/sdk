name: CI

on:
  push:
    branches: [main, develop, "ci/*", "feat/*"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  minimal-baseline:
    name: Install → tsc → eslint → build → smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (schema)
        run: pnpm --filter @refinery/schema exec tsc -p tsconfig.json --noEmit || pnpm --filter cryptiq-mindmap-demo exec tsc -p apps/cryptiq-mindmap-demo/tsconfig.typecheck.json --noEmit

      - name: Lint (app)
        run: pnpm --filter cryptiq-mindmap-demo run lint

      - name: Build app
        run: pnpm --filter cryptiq-mindmap-demo run build

      - name: Smoke
        run: pnpm run smoke

    # Explicitly avoid ML/inference runners/tools in CI
    env:
      # guard rails for scripts that might branch on these
      DISABLE_ML_JOBS: "1"
      DISABLE_VGGT: "1"
